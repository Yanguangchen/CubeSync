<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RPA Form View - CubeSync</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#42d5bb">
    <link rel="stylesheet" href="styles.css">
    <style>
      .rpa-form-capture-view {
        width: min(1180px, calc(100vw - 24px));
        margin: 20px auto;
        padding: 28px;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        border: 1px solid #d1d5db;
      }

      .rpa-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 24px;
        padding-bottom: 18px;
        border-bottom: 2px solid #003399;
      }

      .rpa-back-link {
        display: inline-block;
        margin-bottom: 18px;
        color: #003399;
        text-decoration: none;
        font-weight: 700;
      }

      .rpa-back-link:hover {
        text-decoration: underline;
      }

      .rpa-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .rpa-section {
        margin-top: 26px;
      }

      .rpa-section h2 {
        margin: 0 0 12px;
        color: #003399;
        font-size: 16px;
      }

      .rpa-data-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .rpa-field {
        min-width: 0;
      }

      .rpa-label {
        display: block;
        margin-bottom: 4px;
        color: #4b5563;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .rpa-value {
        min-height: 38px;
        padding: 9px 10px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        background: #f8fafc;
        color: #111827;
        overflow-wrap: anywhere;
      }

      .rpa-results-table {
        width: 100%;
        min-width: 1120px;
        border-collapse: collapse;
        font-size: 12px;
      }

      .rpa-results-table th,
      .rpa-results-table td {
        padding: 8px;
        border: 1px solid #d1d5db;
        vertical-align: top;
        text-align: left;
      }

      .rpa-results-table th {
        background: #f0f5ff;
        color: #003399;
        font-size: 11px;
        text-transform: uppercase;
      }

      .rpa-barcode-preview {
        min-width: 240px;
        margin-top: 6px;
        overflow-x: auto;
        padding: 5px;
        border: 1px dashed #9aa5b1;
        background: #ffffff;
      }

      .rpa-barcode-preview svg {
        display: block;
        width: auto;
        max-width: none;
      }

      .rpa-barcode-preview svg rect:not(.barcode-background) {
        fill: #000000;
      }

      .rpa-message {
        margin-top: 14px;
        color: #b42318;
        font-weight: 700;
      }

      @media (max-width: 860px) {
        .rpa-header,
        .rpa-data-grid {
          grid-template-columns: 1fr;
        }

        .rpa-header {
          display: grid;
        }

        .rpa-actions {
          justify-content: flex-start;
        }
      }
    </style>
    <script src="barcode.js" defer></script>
    <script src="cubesync-form-data.js" defer></script>
    <script type="module" src="firestore.js"></script>
    <script src="rpa-view.js" defer></script>
  </head>
  <body>
    <main class="rpa-form-capture-view">
      <a href="rpa-dashboard.html" class="rpa-back-link">Back to Queue</a>

      <header class="rpa-header">
        <div>
          <h1 id="reportNoDisplay">Loading...</h1>
          <p id="submittedAtDisplay"></p>
          <div id="viewMessage" class="rpa-message" role="status" aria-live="polite"></div>
        </div>
        <div class="rpa-actions">
          <div id="statusBadge" class="status-pill"></div>
          <button type="button" id="btnDisable" class="danger">Disable RPA</button>
        </div>
      </header>

      <section class="rpa-section" aria-labelledby="rpaFieldsTitle">
        <h2 id="rpaFieldsTitle">All Form Fields</h2>
        <div id="formFieldsGrid" class="rpa-data-grid"></div>
      </section>

      <section class="rpa-section" aria-labelledby="rpaResultsTitle">
        <h2 id="rpaResultsTitle">Test Results</h2>
        <div class="table-wrap">
          <table class="rpa-results-table">
            <thead id="resultsHeader"></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{});}</script>
  </body>
</html>
