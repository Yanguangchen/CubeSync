<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RPA Form View - CubeSync</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#42d5bb">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
      :root {
        --xp-blue: #0058e6;
        --xp-bg: #ece9d8;
        --xp-window-border: #0054e3;
      }
      body {
        font-family: "Tahoma", "Trebuchet MS", sans-serif !important;
        background: #3a6ea5 url("assets/xpwallpaper.png") no-repeat center center fixed !important;
        background-size: cover !important;
        margin: 0;
        padding: 20px;
      }
      button, input, select, textarea, a {
        font-family: inherit;
      }
      .rpa-form-capture-view {
        width: min(1000px, 98vw);
        margin: 0 auto;
        padding: 0;
        background: var(--xp-bg);
        border: 3px solid var(--xp-window-border);
        border-radius: 8px 8px 0 0;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        overflow: hidden;
      }

      .rpa-header {
        background: linear-gradient(to bottom, #0058e6 0%, #245edb 10%, #0058e6 50%, #0046b5 100%);
        color: white;
        padding: 0 5px;
        height: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #003b9b;
        text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
      }

      .rpa-header h1 {
        font-size: 11px;
        font-weight: bold;
        margin: 0;
      }

      .rpa-back-link {
        display: inline-block;
        margin: 10px;
        color: #003399;
        text-decoration: underline;
        font-size: 12px;
        font-weight: bold;
      }

      .rpa-back-link:hover {
        background: #316ac5;
        color: white;
      }

      .rpa-actions {
        display: flex;
        gap: 5px;
      }

      .rpa-section {
        margin: 20px 10px 10px 10px;
        padding: 10px;
        background: var(--xp-bg);
        border: 1px solid #aca899;
        position: relative;
      }

      .rpa-section h2 {
        position: absolute;
        top: -10px;
        left: 10px;
        background: var(--xp-bg);
        padding: 0 4px;
        color: #003399;
        font-size: 12px;
        font-weight: bold;
        margin: 0;
      }

      .rpa-data-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .rpa-label {
        display: block;
        margin-bottom: 2px;
        color: #000;
        font-size: 11px;
        font-weight: normal;
      }

      .rpa-value {
        min-height: 24px;
        padding: 4px 6px;
        border: 2px inset #dcdcdc;
        background: #fff;
        color: #000;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .rpa-results-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border: 1px solid #808080;
      }

      .rpa-results-table th {
        background: linear-gradient(to bottom, #f0f0f0 0%, #d4d4d4 100%);
        color: #000;
        border: 1px solid #fff;
        border-right: 1px solid #808080;
        border-bottom: 1px solid #808080;
        padding: 4px;
        font-size: 11px;
        font-weight: normal;
        text-align: left;
      }

      .rpa-results-table td {
        padding: 4px;
        border: 1px solid #f0f0f0;
        font-size: 12px;
        color: #000;
      }

      .rpa-barcode-preview {
        margin-top: 5px;
        padding: 2px;
        border: 1px inset #808080;
        background: #fff;
      }

      .rpa-message {
        color: #c00;
        font-weight: bold;
        font-size: 12px;
      }

      button.danger {
        background: linear-gradient(to bottom, #ff8e00 0%, #d45d00 100%) !important;
        color: white !important;
        border: 1px solid #804000 !important;
        padding: 2px 10px !important;
        font-size: 11px !important;
        font-weight: bold !important;
        border-radius: 3px !important;
        cursor: pointer;
      }

      .status-pill {
        background: #fff;
        border: 1px inset #808080;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: bold;
        color: #000;
      }

      @media (max-width: 860px) {
        .rpa-data-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script src="barcode.js" defer></script>
    <script src="cubesync-form-data.js" defer></script>
    <script src="env.js"></script>
    <script type="module" src="firestore.js"></script>
    <script src="rpa-view.js" defer></script>
  </head>
  <body>
    <main class="rpa-form-capture-view">
      <a href="rpa-dashboard.html" class="rpa-back-link">Back to Queue</a>

      <header class="rpa-header">
        <div>
          <h1 id="reportNoDisplay">Loading...</h1>
          <p id="submittedAtDisplay"></p>
          <div id="viewMessage" class="rpa-message" role="status" aria-live="polite"></div>
        </div>
        <div class="rpa-actions">
          <div id="statusBadge" class="status-pill"></div>
          <button type="button" id="btnDisable" class="danger">Disable RPA</button>
        </div>
      </header>

      <section class="rpa-section" aria-labelledby="rpaFieldsTitle">
        <h2 id="rpaFieldsTitle">All Form Fields</h2>
        <div id="formFieldsGrid" class="rpa-data-grid"></div>
      </section>

      <section class="rpa-section" aria-labelledby="rpaResultsTitle">
        <h2 id="rpaResultsTitle">Test Results</h2>
        <div class="table-wrap">
          <table class="rpa-results-table">
            <thead id="resultsHeader"></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{});}</script>
  </body>
</html>
