<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RPA Daily Bot Queue - CubeSync</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#42d5bb">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="rpa-dashboard.css">
    <link rel="stylesheet" href="xp-taskbar.css">
    <script src="cubesync-form-data.js" defer></script>
    <script src="cubesync-export.js" defer></script>
    <script type="module" src="firestore.js"></script>
    <script src="chime.js" defer></script>
    <script src="rpa-dashboard.js" defer></script>
  </head>
  <body>
    <section id="authGate" class="auth-gate glass-panel">
      <img class="auth-logo" src="assets/logoBanner.png" alt="CubeSync">
      <p class="eyebrow">Authentication</p>
      <h1>Sign in to CubeSync</h1>
      <p>Use your Google account to access Firestore-backed RPA operations.</p>
      <button type="button" id="signInButton">Sign in with Google</button>
    </section>

    <main id="dashboardShell" class="dashboard-shell is-hidden">
      <div class="xp-window">
        <header class="xp-window-title">
          <h1>CubeSync - Daily Bot Queue</h1>
        </header>

        <div class="xp-window-body">
          <div class="xp-toolbar" style="display: flex; gap: 10px; padding: 10px; align-items: center; border-bottom: 1px solid #808080; margin-bottom: 10px;">
            <button type="button" id="prevDay">Previous Day</button>
            <button type="button" id="todayBtn" class="active">Today</button>
            <input type="date" id="datePicker" aria-label="Select date" style="width: auto;">
            <div style="flex-grow: 1;"></div>
            <button type="button" id="exportAllButton" class="export-button" disabled>Export all CSV</button>
            <div class="theme-switch" style="margin-left: 10px;">
              <div class="theme-switch-face">
                <input type="checkbox" id="themeToggle" class="theme-switch-input" aria-label="Toggle light and dark mode">
                <div class="theme-switch-mouth"><div class="theme-switch-tongue"></div></div>
                <div class="theme-switch-eye theme-switch-eye-1"></div>
                <div class="theme-switch-eye theme-switch-eye-2"></div>
              </div>
            </div>
            <div id="currentDateDisplay" class="current-date-badge"></div>
          </div>

          <section class="workspace">
            <section class="list-panel" style="grid-column: span 2;">

              <div class="table-wrap">
                <table class="form-table rpa-table">
                  <thead>
                    <tr>
                      <th scope="col">Time Submitted</th>
                      <th scope="col">Report No</th>
                      <th scope="col">Client</th>
                      <th scope="col">Project</th>
                      <th scope="col">ERP Status</th>
                      <th scope="col">Attempts</th>
                      <th scope="col">Action</th>
                    </tr>
                  </thead>
                  <tbody id="queueList"></tbody>
                </table>
              </div>
            </section>
          </section>
        </div>
      </div>
    </main>
    <footer class="xp-taskbar">
      <div class="xp-start-btn">
        <span>start</span>
      </div>
      <div class="xp-tasks">
        <a href="dashboard.html" class="xp-task">Main Dashboard</a>
        <a href="index.html" class="xp-task">New Form</a>
      </div>
      <div class="xp-tray">
        <span id="authUser" class="auth-user xp-tray-item" style="display: none;"></span>
        <button type="button" id="signOutButton" class="xp-tray-item xp-btn">Sign out</button>
      </div>
    </footer>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        if (window.CubeSyncChime) window.CubeSyncChime.attachButtonChimes();
      });
    </script>
    <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{});}</script>
  </body>
</html>
